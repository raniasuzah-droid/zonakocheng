<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - KALINUX CLOUD</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#020617;
--panel:#0b1220;
--border:#1e293b;
--text:#ffffff;
--muted:rgba(255,255,255,.75);
--green:#22c55e;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui,Arial,sans-serif;
background: radial-gradient(900px 450px at 50% 0%, #1e293b 0%, var(--bg) 60%);
color:var(--text);
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
border:1px solid var(--border);
background:rgba(2,6,23,.55);
border-radius:18px;
padding:20px;
margin-top:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:14px;
background:#0b1220;
border:1px solid #1e293b;
border-radius:12px;
color:white;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#22c55e;
color:#00140a;
font-weight:900;
cursor:pointer;
margin-top:10px;
}

.qris{
width:100%;
max-width:320px;
border-radius:18px;
display:block;
margin:auto;
border:1px solid #1e293b;
}

.price{
font-size:24px;
font-weight:900;
margin-top:10px;
text-align:center;
}

.box{
background:#0b1220;
border:1px solid #1e293b;
padding:14px;
border-radius:14px;
margin-top:14px;
}

.small{
font-size:13px;
line-height:1.6;
opacity:.85;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">

<h1>Checkout KALINUX CLOUD</h1>

<div class="small">
Transfer sesuai nominal lalu upload bukti pembayaran.
</div>

<label>Nama</label>
<input type="text" id="name" placeholder="Nama kamu">

<label>Nomor WhatsApp</label>
<input type="text" id="buyerWa" placeholder="08xxxx">

<label>Metode Pembayaran</label>
<select id="payMethod">
<option>DANA</option>
<option>GOPAY</option>
<option>SHOPEEPAY</option>
</select>

<div class="box">

<div id="summary"></div>

<div class="price" id="totalText">
Rp 0
</div>

</div>

<div class="box">

<div class="small">
QRIS PEMBAYARAN
</div>

<br>

<img
src="https://files.catbox.moe/84p7l2.jpg"
class="qris"
>

<div class="small" style="margin-top:12px">
Atas nama: KALINUX CLOUD
</div>

</div>

<div class="box">

<label>Upload Bukti Transfer</label>

<input
type="file"
id="bukti"
accept="image/*"
>

<button
class="btn"
onclick="uploadOrder()"
>
Kirim Bukti Pembayaran
</button>

</div>

</div>

</div>

<script>

const params = new URLSearchParams(location.search);

const brand  = params.get("brand")  || "KALINUX CLOUD";
const item   = params.get("item")   || "VPS";
const detail = params.get("detail") || "-";
const price  = parseInt(params.get("price") || "0");

document.getElementById("summary").innerHTML =
"<b>Brand:</b> " + brand + "<br>" +
"<b>Produk:</b> " + item + "<br>" +
"<b>Detail:</b> " + detail;

document.getElementById("totalText").innerHTML =
"Rp " + price.toLocaleString("id-ID");

async function uploadOrder(){

const file =
document.getElementById("bukti").files[0];

if(!file){

alert("Pilih bukti transfer dulu");

return;

}

const formData = new FormData();

formData.append(
"nama",
document.getElementById("name").value
);

formData.append(
"wa",
document.getElementById("buyerWa").value
);

formData.append(
"produk",
item
);

formData.append(
"harga",
price
);

formData.append(
"bukti",
file
);

try{

const res =
await fetch(
"http://103.253.244.76:3000/upload",
{
method:"POST",
body:formData
}
);

const data =
await res.json();

if(data.success){

alert("Order berhasil dikirim ke admin");

}else{

alert("Gagal kirim order");

}

}catch(e){

console.log(e);

alert("Server error");

}

}

</script>

</body>
</html>
